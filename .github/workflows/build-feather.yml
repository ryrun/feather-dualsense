name: build-feather

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib srecord cmake build-essential


      - name: Ensure pico-sdk is available
        run: |
          if [ ! -f pico-sdk/external/pico_sdk_import.cmake ]; then
            git clone --depth 1 --recurse-submodules https://github.com/raspberrypi/pico-sdk.git pico-sdk
          fi

      - name: Configure
        run: |
          mkdir -p build
          cd build
          PICO_BOARD=feather_host cmake .. -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          make -j"$(nproc)"

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: feather_remapper_${{ github.sha }}.uf2
          path: build/*.uf2
